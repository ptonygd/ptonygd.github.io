<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <script>
    var path = window.location.pathname;
    var base = '/poko';

    // Strip the base prefix to get the sub-path
    var sub = path.startsWith(base) ? path.slice(base.length) : path;

    // Only redirect if there's actually a sub-path (not root / or empty)
    if (sub && sub !== '/' && sub !== '') {
      window.location.replace(
        base + '/?p=' + encodeURIComponent(sub) + window.location.search.replace('?','&')
      );
    } else {
      // Root — just load index.html directly, no redirect needed
      window.location.replace(base + '/');
    }
  </script>
</head>
<body></body>
</html>
